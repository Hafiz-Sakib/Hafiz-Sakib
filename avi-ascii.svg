<svg viewBox="0 0 620 590" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, Menlo, monospace" font-size="12">
<rect width="100%" height="100%" fill="transparent"/>
<text x="10" y="30" fill="#8b949e" xml:space="preserve">$ python scripts/prep_photo.py your-photo.jpg</text>
<text x="10" y="55" fill="#8b949e" xml:space="preserve">$ python scripts/make_ascii_svg.py</text>
<text x="10" y="90" fill="#39d353" xml:space="preserve">[placeholder — swap avi-ascii.svg for your real portrait]</text>
<g opacity="0">
<animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.6s" fill="freeze"/>
<text x="10" y="140" fill="#58a6ff" font-size="14" xml:space="preserve">.--------------------------------.</text>
<text x="10" y="160" fill="#58a6ff" font-size="14" xml:space="preserve">|  run the pipeline with a photo  |</text>
<text x="10" y="180" fill="#58a6ff" font-size="14" xml:space="preserve">|  to generate real ASCII art     |</text>
<text x="10" y="200" fill="#58a6ff" font-size="14" xml:space="preserve">'----------------------------------'</text>
</g>
</svg>
